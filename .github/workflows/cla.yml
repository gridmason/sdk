name: CLA Assistant

# Gates external contributions on a signed Contributor License Agreement
# (.github/CLA.md), which is load-bearing for AGPL-3.0 + commercial dual
# licensing (GW-D8). Signatures are recorded in the `signatures` branch of this
# repo.
#
# Scope note: this workflow only runs against pull requests targeting `main`.
# The internal issue-flow integration flow (draft PRs into epic/** from
# issue/** branches) deliberately does NOT trigger it — those never target
# main, so the CLA check runs once, on the batch PR that actually lands on main,
# and no CI-like job runs on the epic/issue branches.
on:
  # Comment-driven signing and re-checks ("recheck" / the sign sentence).
  issue_comment:
    types: [created]
  # Runs on PRs into main only.
  pull_request_target:
    types: [opened, closed, synchronize]
    branches: [main]

permissions:
  actions: write        # manage the recheck workflow-dispatch state
  contents: write       # commit signatures to the `signatures` branch
  pull-requests: write  # comment on and label the PR
  statuses: write       # set the CLA commit status

jobs:
  cla:
    name: CLA signature check
    runs-on: ubuntu-latest
    # Only act on the sign/recheck comment sentences, or on PR events — not on
    # every unrelated issue comment.
    if: >
      (github.event_name == 'issue_comment' &&
        (github.event.comment.body == 'recheck' ||
         github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
      || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Provided automatically by Actions; no PAT needed since signatures
          # live in this same repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Where signatures are recorded, and on which branch.
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'signatures'
          # The document contributors are agreeing to.
          path-to-document: 'https://github.com/gridmason/sdk/blob/main/.github/CLA.md'
          # The exact sentence a contributor comments to sign (matches CLA.md).
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
          # No signature required from the repository owner or bot accounts.
          allowlist: sniper7kills,dependabot[bot],github-actions[bot],*[bot]
